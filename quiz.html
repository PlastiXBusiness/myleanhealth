<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GLP-1 Muscle Risk Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ─── RESET & BASE ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Hanken Grotesk', sans-serif;
  background: #ffffff;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ─── TOKENS ─── */
:root {
  --lime: #c5ed82;
  --lime-dark: #a8d45e;
  --lime-light: #eaf9cc;
  --black: #111111;
  --gray-900: #1a1a1a;
  --gray-600: #5c5c5c;
  --gray-400: #9a9a9a;
  --gray-200: #e8e8e4;
  --gray-100: #f5f5f2;
  --white: #ffffff;
  --radius-pill: 100px;
  --radius-card: 20px;
  --radius-sm: 12px;
  --serif: 'DM Serif Display', serif;
  --sans: 'Hanken Grotesk', sans-serif;
  --risk-high-bg: #fff0f0; --risk-high-border: #f5a0a0; --risk-high-text: #991b1b;
  --risk-mod-bg: #fffbeb;  --risk-mod-border: #fcd34d;  --risk-mod-text: #92400e;
  --risk-low-bg: #f0fdf4;  --risk-low-border: #86efac;  --risk-low-text: #14532d;
}

/* ─── SHELL ─── */
#app {
  width: 100%;
  max-width: 430px;
  background: var(--white);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ─── TOP BAR ─── */
.top-bar {
  background: var(--lime);
  text-align: center;
  padding: 12px 16px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  color: var(--black);
  flex-shrink: 0;
  letter-spacing: 0.01em;
  position: sticky;
  top: 0;
  z-index: 100;
}

/* ─── LOGO BAR ─── */
.logo-bar {
  padding: 16px 24px 14px;
  flex-shrink: 0;
}
.logo {
  font-family: var(--sans);
  font-size: 32px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: -0.04em;
  color: var(--black);
}

/* ─── HERO IMAGE ─── */
.hero-wrap {
  width: 100%;
  height: 245px;
  background: #3d5a2e;
  overflow: hidden;
  flex-shrink: 0;
  position: relative;
  border-radius: 0;
}
.hero-fallback {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, #3d5a2e 0%, #5a7c42 50%, #c5ed82 100%);
  display: flex;
  align-items: center;
  justify-content: center;
}
.hero-fallback-text {
  font-family: var(--serif);
  font-size: 28px;
  color: rgba(255,255,255,0.9);
  text-align: center;
  line-height: 1.3;
  padding: 20px;
}
.hero-wrap img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center bottom;
  z-index: 1;
}

/* ─── MAIN CARD ─── */
.card {
  background: var(--white);
  flex: 1;
  padding: 16px 24px 48px;
}

/* ─── PROGRESS HEADER ─── */
.progress-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
}
.back-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1.5px solid var(--gray-200);
  background: var(--white);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 18px;
  line-height: 1;
  color: var(--gray-600);
  transition: background 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
  padding-bottom: 1px;
}
.back-btn:hover { background: var(--gray-100); border-color: var(--gray-400); }
.back-btn:active { background: var(--lime-light); }
.back-spacer { width: 36px; flex-shrink: 0; }

.progress-track {
  flex: 1;
  height: 4px;
  background: var(--gray-200);
  border-radius: 4px;
  overflow: hidden;
}
@keyframes shimmer {
  0%   { left: -55%; }
  100% { left: 130%; }
}
.progress-fill {
  height: 100%;
  border-radius: 4px;
  background: #a8d45e;
  transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}
.progress-fill::after {
  content: '';
  position: absolute;
  top: 0;
  left: -55%;
  width: 50%;
  height: 100%;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.55) 50%, transparent 100%);
  animation: shimmer 3.2s ease-in-out infinite;
}

/* ─── SECTION LABEL ─── */
.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gray-400);
  margin-bottom: 6px;
}

/* ─── QUESTION TITLE ─── */
.question-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--black);
  line-height: 1.2;
  margin-bottom: 4px;
  letter-spacing: -0.01em;
}
.question-sub {
  font-size: 13px;
  color: var(--gray-600);
  line-height: 1.5;
  margin-bottom: 16px;
}

/* ─── OPTIONS ─── */
.options {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 6px;
}

.opt-btn {
  width: 100%;
  padding: 11px 16px;
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-pill);
  background: var(--white);
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 500;
  color: var(--gray-900);
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  line-height: 1.35;
  transition: border-color 0.12s, background 0.12s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  overflow: hidden;
}
.opt-btn:hover { border-color: #c0c0bc; background: var(--gray-100); }
.opt-btn:active { transform: scale(0.98); }

.opt-btn.selected {
  border-color: var(--lime-dark);
  background: var(--lime);
  color: var(--black);
}
.opt-btn.flash {
  border-color: var(--lime-dark);
  background: var(--lime);
  transition: background 0.08s;
}

.opt-text { flex: 1; }
.opt-note {
  font-size: 11px;
  color: var(--gray-400);
  display: block;
  margin-top: 2px;
  font-weight: 400;
}
.opt-btn.selected .opt-note { color: #5a7a30; }

.opt-check {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--gray-200);
  flex-shrink: 0;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: transparent;
  transition: background 0.15s, border-color 0.15s;
}
.opt-check.square { border-radius: 6px; display: flex; }
.opt-btn.selected .opt-check {
  background: var(--lime-dark);
  border-color: var(--lime-dark);
  color: var(--black);
}

/* ─── CONTINUE BUTTON ─── */
.continue-btn {
  width: 100%;
  padding: 13px 20px;
  background: var(--black);
  color: var(--white);
  border: none;
  border-radius: var(--radius-pill);
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 16px;
  letter-spacing: -0.01em;
  transition: background 0.15s, transform 0.1s, opacity 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.continue-btn:hover { background: #2a2a2a; }
.continue-btn:active { transform: scale(0.98); }
.continue-btn:disabled {
  background: var(--gray-200);
  color: var(--gray-400);
  cursor: not-allowed;
}
.skip-btn {
  width: 100%;
  padding: 13px 20px;
  background: transparent;
  color: var(--gray-600);
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-pill);
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.skip-btn:hover { background: var(--gray-100); }

/* ─── BRIDGE SCREEN ─── */
.bridge-card {
  background: var(--gray-100);
  border-radius: var(--radius-card);
  border-left: 3px solid var(--lime-dark);
  padding: 20px 20px 16px;
  margin-bottom: 20px;
}
.bridge-stat {
  font-family: var(--serif);
  font-size: 72px;
  line-height: 1;
  color: var(--black);
  letter-spacing: -0.04em;
  margin-bottom: 2px;
}
.bridge-stat-label {
  font-size: 16px;
  font-weight: 700;
  color: var(--black);
  line-height: 1.3;
  margin-bottom: 10px;
}
.bridge-headline {
  font-family: var(--serif);
  font-size: 20px;
  color: var(--black);
  line-height: 1.3;
  margin-bottom: 12px;
}
.bridge-pills {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 12px;
}
.bridge-pill {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
  line-height: 1.3;
}
.bridge-body {
  font-size: 13px;
  color: var(--gray-600);
  line-height: 1.6;
}
.bridge-body .highlight {
  font-weight: 700;
  color: var(--black);
  background: var(--lime-light);
  padding: 1px 5px;
  border-radius: 4px;
}

/* ─── GAP CARDS (results) ─── */
.gap-section { margin-bottom: 20px; }
.gap-section-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gray-400);
  margin-bottom: 10px;
}
.gap-card {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 14px;
  background: var(--gray-100);
  border-radius: 14px;
  margin-bottom: 8px;
}
.gap-card:last-child { margin-bottom: 0; }
.gap-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.gap-name { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray-400); margin-bottom: 2px; }
.gap-title { font-size: 14px; font-weight: 600; color: var(--black); margin-bottom: 2px; }
.gap-desc { font-size: 12px; color: var(--gray-600); line-height: 1.4; }

/* ─── BLUEPRINT COMPONENTS ─── */
.blueprint-section {
  background: var(--gray-100);
  border-radius: var(--radius-card);
  padding: 16px 18px;
  margin-bottom: 20px;
}
.bp-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gray-400);
  margin-bottom: 12px;
}
.bp-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 0.5px solid var(--gray-200);
}
.bp-row:last-child { border-bottom: none; padding-bottom: 0; }
.bp-check { font-size: 12px; color: #27500A; flex-shrink: 0; margin-top: 2px; font-weight: 700; }
.bp-name { font-size: 13px; font-weight: 600; color: var(--black); flex: 1; }
.bp-val { font-size: 11px; color: var(--gray-400); flex-shrink: 0; }

/* ─── LOADING SCREEN ─── */
.loading-screen {
  padding: 40px 0 20px;
  text-align: center;
}
.loading-title {
  font-family: var(--serif);
  font-size: 22px;
  color: var(--black);
  margin-bottom: 32px;
  line-height: 1.35;
}
.loading-steps {
  display: inline-flex;
  flex-direction: column;
  gap: 0;
  text-align: left;
}
.load-step {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  font-size: 14px;
  color: var(--gray-400);
  opacity: 0.35;
  transition: opacity 0.35s, color 0.35s;
}
.load-step.active { color: var(--black); opacity: 1; }
.load-step.done { color: var(--gray-600); opacity: 0.75; }
.load-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--gray-200);
  flex-shrink: 0;
  transition: background 0.35s;
}
.load-step.active .load-dot,
.load-step.done .load-dot { background: var(--lime-dark); }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0.25} }
.load-step.active .load-dot { animation: blink 0.9s infinite; }

/* ─── EMAIL CAPTURE ─── */
.email-screen { padding-top: 8px; }
.results-ready-label {
  display: inline-block;
  background: var(--lime-light);
  color: #3d5a1e;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: var(--radius-pill);
  margin-bottom: 16px;
}
.form-input {
  display: block;
  width: 100%;
  padding: 14px 16px;
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-family: var(--sans);
  font-size: 15px;
  color: var(--black);
  background: var(--white);
  margin-bottom: 10px;
  transition: border-color 0.15s;
  outline: none;
  -webkit-appearance: none;
}
.form-input:focus { border-color: var(--lime-dark); }
.form-input::placeholder { color: var(--gray-400); }
.privacy-note {
  font-size: 11px;
  color: var(--gray-400);
  text-align: center;
  margin-top: 12px;
  line-height: 1.5;
}

/* ─── RESULTS SCREEN ─── */
.results-screen { padding-top: 8px; }

/* ─── INTRO SCREEN ─── */
.intro-screen { padding: 8px 0 4px; }
.intro-brand {
  font-family: var(--serif);
  font-size: 34px;
  letter-spacing: -0.04em;
  color: var(--black);
  margin-bottom: 14px;
}
.intro-headline {
  font-size: 22px;
  font-weight: 700;
  color: var(--black);
  line-height: 1.25;
  letter-spacing: -0.02em;
  margin-bottom: 12px;
}
.intro-sub {
  font-size: 13px;
  color: var(--gray-600);
  line-height: 1.6;
  margin-bottom: 24px;
}

/* ─── RESULTS REDESIGN ─── */
.results-intro-text {
  font-family: var(--serif);
  font-size: 20px;
  color: var(--black);
  line-height: 1.35;
  margin-bottom: 18px;
  letter-spacing: -0.01em;
}
.risk-consequences {
  font-size: 13px;
  color: var(--gray-600);
  line-height: 1.7;
  margin-bottom: 20px;
  padding: 14px 16px;
  background: var(--gray-100);
  border-radius: 12px;
}
.bp-val-strike {
  font-size: 11px;
  color: #cc2222;
  text-decoration: line-through;
  flex-shrink: 0;
}
.bp-total-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--gray-200);
}
.bp-total-label { font-size: 12px; color: var(--gray-600); flex: 1; }
.bp-total-price { font-size: 14px; color: #cc2222; font-weight: 600; text-decoration: line-through; }
.bp-total-free {
  font-size: 13px; font-weight: 700; color: #27500A;
  background: var(--lime); padding: 2px 10px;
  border-radius: var(--radius-pill);
}
.green-result-bar {
  background: var(--lime-light);
  border: 1.5px solid var(--lime-dark);
  color: #27500A;
  font-size: 13px;
  font-weight: 700;
  text-align: center;
  padding: 12px 20px;
  border-radius: var(--radius-pill);
  margin-top: 16px;
  margin-bottom: 8px;
}

.risk-badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 7px 16px;
  border-radius: var(--radius-pill);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 14px;
  border: 1.5px solid;
}
.risk-badge::before {
  content: '';
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: currentColor;
}
.risk-high { color: var(--risk-high-text); background: var(--risk-high-bg); border-color: var(--risk-high-border); }
.risk-mod  { color: var(--risk-mod-text);  background: var(--risk-mod-bg);  border-color: var(--risk-mod-border); }
.risk-low  { color: var(--risk-low-text);  background: var(--risk-low-bg);  border-color: var(--risk-low-border); }

.result-message {
  font-size: 22px;
  font-weight: 600;
  color: var(--black);
  line-height: 1.25;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
}
.result-submessage {
  font-size: 14px;
  color: var(--gray-600);
  line-height: 1.6;
  margin-bottom: 24px;
}

.result-cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
.result-card {
  background: var(--gray-100);
  border-radius: var(--radius-card);
  padding: 16px 18px;
}
.rc-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gray-400);
  margin-bottom: 5px;
}
.rc-value {
  font-size: 18px;
  font-weight: 600;
  color: var(--black);
  letter-spacing: -0.02em;
  line-height: 1.3;
}
.rc-sub {
  font-size: 12px;
  color: var(--gray-600);
  margin-top: 4px;
  line-height: 1.45;
}

/* ─── NEXT STEPS ─── */
.next-steps {
  background: var(--lime-light);
  border-radius: var(--radius-card);
  padding: 18px;
  margin-bottom: 24px;
}
.next-steps-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #4a6a22;
  margin-bottom: 12px;
}
.step-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 10px;
}
.step-row:last-child { margin-bottom: 0; }
.step-num {
  width: 24px;
  height: 24px;
  background: var(--lime-dark);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--black);
  flex-shrink: 0;
  margin-top: 1px;
}
.step-text {
  font-size: 13px;
  color: #2a3d12;
  line-height: 1.5;
}

/* ─── CALENDLY BUTTON ─── */
.calendly-btn {
  display: block;
  width: 100%;
  padding: 16px 20px;
  background: var(--black);
  color: var(--white);
  border: none;
  border-radius: var(--radius-pill);
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 600;
  text-align: center;
  text-decoration: none;
  letter-spacing: -0.01em;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.calendly-btn:hover { background: #2a2a2a; }
.calendly-btn:active { transform: scale(0.98); }
.calendly-label {
  font-size: 12px;
  color: var(--gray-400);
  text-align: center;
  margin-top: 10px;
}

/* ─── EXIT SCREEN ─── */
.exit-screen { padding-top: 20px; }

/* ─── SLIDE TRANSITIONS ─── */
@keyframes slideIn {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes slideInBack {
  from { opacity: 0; transform: translateX(-20px); }
  to   { opacity: 1; transform: translateX(0); }
}
.slide-in      { animation: slideIn     0.22s ease-out both; }
.slide-in-back { animation: slideInBack 0.22s ease-out both; }

/* ─── DISCLAIMER ─── */
.disclaimer {
  font-size: 10px;
  color: var(--gray-400);
  text-align: center;
  margin-bottom: 20px;
  line-height: 1.5;
}
</style>
</head>

<body>
<div id="app">
  <!-- Top bar -->
  <div class="top-bar">The GLP-1 Muscle Protection Protocol</div>

  <!-- Hero — save your image as hero.jpg in this same folder -->
  <div class="hero-wrap">
    <div class="hero-fallback">
      <div class="hero-fallback-text">Know your<br>muscle risk.</div>
    </div>
    <img id="hero-img" src="1.png" alt="" onerror="this.style.display='none'">
  </div>

  <!-- Main card -->
  <div class="card" id="card">
    <div id="qroot"></div>
  </div>
</div>

<script>
/* ─── CONFIG ─── */
const SHEET_URL    = 'https://script.google.com/macros/s/AKfycbw2Rq_UAiNGoU-QrJYnz4XuDNRzbqiYs5urLTL2gmqcLnutnhgKCo0hTL_sacURvc94iw/exec';
const CALENDLY_URL = 'https://calendly.com/YOUR_LINK';

/* ─── STATE ─── */
let ci = 0, ans = {}, exited = false, done = false, goingBack = false;

/* Session ID único por visita — permite hacer upsert en Sheets */
const sessionId = Date.now().toString(36) + Math.random().toString(36).slice(2);

/* ─── RISK CALC (updated per scoring design doc) ─── */
function calcRisk(){
  let score = 0;
  /* Medication: sema=0, tirz=+1, other=0, stopped=+3 */
  const mm = {sema:0, tirz:1, other:0, stopped:3};
  /* Duration */
  const dm = {lt1m:0,'1-3m':1,'3-6m':2,'6-12m':3,gt12m:4};
  /* Weight lost */
  const wm = {lt10:0,'10-20':1,'20-35':2,'35-50':3,gt50:4};
  /* Exercise (highest weight factor) */
  const em = {none:4, light:3, cardio:2, occ:1, resist:0};
  /* Protein */
  const pm = {notrack:3, lt50:3,'50-80':2,'80-120':1,gt120:0};

  score += (mm[ans.med] ?? 0)
         + (dm[ans.dur] ?? 0)
         + (wm[ans.wlost] ?? 0)
         + (em[ans.ex] ?? 2)
         + (pm[ans.pro] ?? 2);

  /* Timeline to stop (new question) */
  const tm = {stop_soon:3, stop_maybe:1, stop_no:0};
  score += (tm[ans.timeline] ?? 1);

  /* Tiers: 0-5 LOW · 6-11 MODERATE · 12+ HIGH */
  if(score >= 12) return 'HIGH';
  if(score >= 6)  return 'MODERATE';
  return 'LOW';
}

function estMuscle(){
  const wm = {lt10:5,'10-20':15,'20-35':27,'35-50':42,gt50:57};
  const w = wm[ans.wlost] || 15;
  return Math.round(w*0.25) + '–' + Math.round(w*0.39) + ' lbs';
}
function proteinTarget(){
  const wkg = {lt140:57,'140-165':68,'165-190':80,'190-220':93,gt220:108};
  const kg = wkg[ans.wcurr] || 75;
  return Math.round(kg*1.4) + 'g';
}

/* ─── GOOGLE SHEETS — envío a Sheets (fire-and-forget) ─── */
function sendToSheets(payload){
  if(!SHEET_URL || SHEET_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL') return;
  fetch(SHEET_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).catch(() => {});
}

/* Se llama en cada paso: crea la fila la primera vez, la actualiza en los siguientes */
function trackStep(lastStep){
  sendToSheets({
    session_id:     sessionId,
    last_step:      lastStep,
    timestamp:      new Date().toISOString(),
    completed:      'no',
    ...ans
  });
}

/* Se llama solo al final cuando el usuario introduce nombre + email */
function submitToSheets(name, email){
  sendToSheets({
    session_id:      sessionId,
    last_step:       'completed',
    timestamp:       new Date().toISOString(),
    completed:       'yes',
    name, email,
    risk:            calcRisk(),
    muscle_estimate: estMuscle(),
    protein_target:  proteinTarget(),
    ...ans
  });
}

/* ─── NAVIGATION ─── */
function goNext(){
  const s = SC[ci];
  if(s.id === 'gender' && ans.gender === 'man'){
    trackStep('gender_exit');
    exited = true; render(); return;
  }
  if(s.type === 'email'){
    const name  = document.getElementById('enm')?.value?.trim();
    const email = document.getElementById('eem')?.value?.trim();
    submitToSheets(name, email); /* envío final con nombre+email */
    done = true; render(); return;
  }
  if(s.type !== 'intro') trackStep(s.id);
  goingBack = false;
  ci++; render();
  if(SC[ci] && SC[ci].type === 'loading') doLoad();
}

function goBack(){
  if(exited){ exited = false; ans.gender = undefined; goingBack = true; render(); return; }
  if(ci > 0){ goingBack = true; ci--; render(); }
}

/* ─── SELECTION ─── */
function sel(oi){
  const s = SC[ci];
  ans[s.id] = s.opts[oi].v;
  const btns = document.querySelectorAll('.opt-btn');
  if(btns[oi]) btns[oi].classList.add('flash');
  setTimeout(() => goNext(), 280);
}

function selM(oi){
  const s = SC[ci];
  const o = s.opts[oi];
  if(!ans[s.id]) ans[s.id] = [];
  if(o.x){
    ans[s.id] = ans[s.id].includes(o.v) ? [] : [o.v];
  } else {
    const excl = s.opts.filter(x=>x.x).map(x=>x.v);
    ans[s.id] = ans[s.id].filter(v=>!excl.includes(v));
    if(ans[s.id].includes(o.v)) ans[s.id] = ans[s.id].filter(v=>v!==o.v);
    else ans[s.id].push(o.v);
  }
  /* Update buttons in-place — no re-render so no slide animation fires */
  const selA = ans[s.id];
  document.querySelectorAll('.opt-btn').forEach((btn, i) => {
    if(i >= s.opts.length) return;
    const isSel = selA.includes(s.opts[i].v);
    btn.classList.toggle('selected', isSel);
    const check = btn.querySelector('.opt-check');
    if(check) check.textContent = isSel ? '✓' : '';
    const note = btn.querySelector('.opt-note');
    if(note) note.style.color = isSel ? '#5a7a30' : '';
  });
}

function chkEmail(){
  const btn = document.getElementById('ebtn');
  const n   = document.getElementById('enm');
  const e   = document.getElementById('eem');
  if(btn && n && e)
    btn.disabled = !(n.value.trim() && e.value.includes('@') && e.value.includes('.'));
}

/* ─── LOADING ANIMATION ─── */
function doLoad(){
  let step = 0;
  const steps_labels = [
    'Analyzing your GLP-1 timeline',
    'Estimating lean mass loss',
    'Reviewing your protein gap',
    'Generating your personalized Blueprint'
  ];
  const iv = setInterval(() => {
    const el = document.getElementById('ls'+step);
    if(el) el.className = 'load-step done';
    step++;
    const nel = document.getElementById('ls'+step);
    if(nel) nel.className = 'load-step active';
    if(step >= steps_labels.length){
      clearInterval(iv);
      setTimeout(() => { ci++; render(); }, 600);
    }
  }, 900);
}

    var border  = is60 ? '#d97706' : '#f59e0b';

  const gaps = [];
  const exMap = {
    none:   {icon:'🏋️', title:'No resistance training',       desc:'Your highest-risk factor. Muscle loss accelerates without it.'},
    light:  {icon:'🏋️', title:'No resistance training',       desc:'Walks and yoga don\'t protect muscle. Progressive resistance does.'},
    cardio: {icon:'🏋️', title:'Cardio only — no resistance',  desc:'Cardio burns calories but doesn\'t prevent muscle loss.'}
  };
  if(exMap[ans.ex]) gaps.push({label:'Exercise gap', ...exMap[ans.ex]});

  const pmEst = {notrack:40, lt50:40,'50-80':65,'80-120':100,gt120:130};
  const target = parseInt(proteinTarget());
  const current = pmEst[ans.pro] || 40;
  const diff = target - current;
  if(diff > 10) gaps.push({icon:'🥩', label:'Protein gap', title:`~${diff}g short every day`, desc:`Your target: ${proteinTarget()}/day. You're getting ~${current}g.`});

  if(ans.timeline === 'stop_soon')
    gaps.push({icon:'⏱️', label:'Off-ramp risk', title:'Stopping within 1–3 months', desc:'Without a protocol, most women regain weight and lose more muscle after stopping.'});
  else if(ans.med === 'stopped')
    gaps.push({icon:'⚠️', label:'Off-ramp risk', title:'Already stopped', desc:'Muscle and weight regain risk is at its peak right now.'});
  else if(ans.fear === 'terrified')
    gaps.push({icon:'⏱️', label:'Off-ramp concern', title:'No exit strategy yet', desc:'Your Blueprint includes a specific plan so stopping doesn\'t undo your results.'});

  return gaps.slice(0,3).map(g => `
    <div class="gap-card">
      <div class="gap-icon">${g.icon}</div>
      <div>
        <div class="gap-name">${g.label}</div>
        <div class="gap-title">${g.title}</div>
        <div class="gap-desc">${g.desc}</div>
      </div>
    </div>`).join('');
}

/* ─── HERO IMAGE UPDATER ─── */
/* Store the original hero src once on first load */
var _origHeroSrc = null;

function updateHero(){
  const img = document.getElementById('hero-img');
  if(!img) return;

  /* Save original portrait on first call */
  if(!_origHeroSrc) _origHeroSrc = img.src;

  const s = done ? null : (exited ? null : SC[ci]);

  /* Intro screen → always show the original portrait */
  const isIntro = !s || s.type === 'intro';
  const target = isIntro ? _origHeroSrc : ((s && s.img) ? s.img : _origHeroSrc);

  if(img.src !== target){
    /* Preload into memory first — old image stays visible until new one is ready */
    const preload = new Image();
    preload.onload = function(){
      img.src = target;
      img.style.opacity = '1';
      img.style.display = 'block';
    };
    preload.onerror = function(){ img.style.display = 'none'; };
    preload.src = target;
  } else {
    img.style.opacity = '1';
    img.style.display = 'block';
  }
}

/* ─── MAIN RENDER ─── */
function render(){
  const root = document.getElementById('qroot');
  const animClass = goingBack ? 'slide-in-back' : 'slide-in';

  if(done){
    root.innerHTML = `<div class="${animClass}">${renderDone()}</div>`;
    return;
  }
  if(exited){
    root.innerHTML = `<div class="${animClass}">${renderExit()}</div>`;
    return;
  }

  const s = SC[ci];

  /* Progress */
  const totalQ  = 17;
  /* Para bridges (sin qn) usamos el qn de la pregunta anterior para que la barra no retroceda */
  let pct;
  if(s.qn) {
    pct = Math.round((s.qn / totalQ) * 100);
  } else if(s.type === 'loading') {
    pct = 95;
  } else if(s.type === 'email') {
    pct = 98;
  } else {
    let prevQn = 0;
    for(let i = ci - 1; i >= 0; i--){ if(SC[i].qn){ prevQn = SC[i].qn; break; } }
    pct = Math.round((prevQn / totalQ) * 100);
  }
  const showHdr = s.type !== 'loading' && s.type !== 'email' && s.type !== 'intro' && s.qn !== 1;

  let hdr = '';
  if(showHdr){
    const backBtn = ci > 0
      ? `<button class="back-btn" onclick="goBack()" aria-label="Go back"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 14L6 9l5-5"/></svg></button>`
      : `<div class="back-spacer"></div>`;
    hdr = `
      <div class="progress-header">
        ${backBtn}
        <div class="progress-track">
          <div class="progress-fill" style="width:${pct}%"></div>
        </div>
      </div>`;
  }

  let body = '';
  if(s.type === 'intro')    body = renderIntro();
  else if(s.type === 'single')   body = s.qn === 1 ? renderGender(s) : renderSingle(s);
  else if(s.type === 'multi')   body = renderMulti(s);
  else if(s.type === 'bridge')  body = renderBridge(s);
  else if(s.type === 'notes')   body = renderNotes(s);
  else if(s.type === 'loading') body = renderLoading();
  else if(s.type === 'email')   body = renderEmail();

  root.innerHTML = `${hdr}<div class="${animClass}">${body}</div>`;

  /* Update hero image */
  updateHero();

  /* Re-attach bridge btn after render */
  var bb = document.getElementById('bridge-btn-go');
  if(bb){ bb.addEventListener('click', function(){ bridgeNext(SC[ci].id); }); }

  /* Re-attach email listeners after render */
  if(s.type === 'email'){
    document.getElementById('enm')?.addEventListener('input', chkEmail);
    document.getElementById('eem')?.addEventListener('input', chkEmail);
  }
}

}

/* ─── INIT ─── */
render();

function doPost(e) {
  const sheet = SpreadsheetApp.openById('TU_SPREADSHEET_ID').getActiveSheet();
  const data  = JSON.parse(e.postData.contents);
  const keys  = Object.keys(data);
  const vals  = Object.values(data);

  // Inicializar cabeceras si la hoja está vacía
  if (sheet.getLastRow() === 0) {
    sheet.appendRow(keys);
    sheet.appendRow(vals);
    return ok();
  }

  const lastCol  = sheet.getLastColumn();
  const headers  = sheet.getRange(1, 1, 1, lastCol).getValues()[0];
  const sidIdx   = headers.indexOf('session_id'); // columna del session_id (0-based)

  // Buscar si ya existe una fila con este session_id
  if (sidIdx >= 0 && data.session_id && sheet.getLastRow() > 1) {
    const sidCol   = sidIdx + 1; // 1-based para getRange
    const nRows    = sheet.getLastRow() - 1;
    const sessions = sheet.getRange(2, sidCol, nRows, 1).getValues().flat();
    const rowIdx   = sessions.indexOf(data.session_id); // 0-based dentro del array

    if (rowIdx >= 0) {
      // ACTUALIZAR fila existente — añadir columnas nuevas si hacen falta
      keys.forEach((k, i) => {
        let col = headers.indexOf(k) + 1; // 1-based
        if (col === 0) {
          // Columna nueva: añadir cabecera al final
          col = sheet.getLastColumn() + 1;
          sheet.getRange(1, col).setValue(k);
          headers.push(k);
        }
        sheet.getRange(rowIdx + 2, col).setValue(vals[i]);
      });
      return ok();
    }
  }

  // NUEVA fila: añadir columnas que aún no existan
  keys.forEach(k => {
    if (!headers.includes(k)) {
      const col = sheet.getLastColumn() + 1;
      sheet.getRange(1, col).setValue(k);
      headers.push(k);
    }
  });
  sheet.appendRow(headers.map(h => {
    const i = keys.indexOf(h);
    return i >= 0 ? vals[i] : '';
  }));
  return ok();
}

function ok() {
  return ContentService
    .createTextOutput(JSON.stringify({status:'ok'}))
    .setMimeType(ContentService.MimeType.JSON);
}
